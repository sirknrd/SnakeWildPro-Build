name: Build Snake Wild Pro APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf cmake libtool pkg-config \
          libncurses5-dev libncursesw5-dev zlib1g-dev libffi-dev libssl-dev \
          build-essential python3-dev python3-pip python3-setuptools \
          libsqlite3-dev sqlite3 bzip2 libbz2-dev liblzma-dev libgdbm-dev \
          libnss3-dev libreadline-dev wget curl

      - name: Install Buildozer and Cython
        run: |
          pip3 install --user --upgrade "buildozer" "Cython==0.29.36"

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:/home/runner/.local/bin
          # Ahora con Java 17 el comando gradlew no debería fallar
          yes | buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Snake-APK-Final
          path: bin/*.apk
